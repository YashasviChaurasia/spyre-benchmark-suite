kind: Pod
apiVersion: v1
metadata:
  name: yc-vllm-spyre-multi-card
  labels:
    deployer: yc
    purpose: benchmark
spec:
  schedulerName: spyre-scheduler
  securityContext:
    seccompProfile:
      type: RuntimeDefault
  containers:
    - name: app
      image: us.icr.io/wxpe-cicd-internal/amd64/vllm-spyre-dev:dev-next
      imagePullPolicy: Always
      resources:
        limits:
          ibm.com/spyre_pf: '2'
        requests:
          ibm.com/spyre_pf: '2'
      workingDir: /dev/shm
      env:
        - name: BENCHMARK_REPO
          value: https://github.com/YashasviChaurasia/spyre-benchmark-suite.git
        - name: BENCHMARK_BRANCH
          value: main
        - name: SPYRE_INFERENCE_REPO
          value: https://github.com/torch-spyre/spyre-inference.git
        - name: SPYRE_INFERENCE_BRANCH
          value: main
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: hf-token
              key: token
              optional: true
        - name: HOME
          value: /dev/shm
        - name: HF_HOME
          value: /dev/shm
        - name: FLEX_COMPUTE
          value: SENTIENT
        - name: FLEX_DEVICE
          value: PF
        - name: TOKENIZERS_PARALLELISM
          value: 'false'
        - name: AIU_SETUP_MULTI_AIU
          value: '1'
        - name: SAVE_TO_PYTORCH_BENCHMARK_FORMAT
          value: '1'
      command:
        - bash
        - -c
        - |
            set -ex

            rm -rf /dev/shm/.venv /dev/shm/spyre-inference /dev/shm/benchmark-suite

            cp /home/senuser/.bashrc ~/
            cp /home/senuser/.bash_profile ~/

            curl -LsSf https://astral.sh/uv/install.sh | sh
            export PATH="$HOME/.local/bin:$PATH"
            uv venv .venv --system-site-packages
            source ./.venv/bin/activate

            export PATH="/opt/ibm/spyre/runtime/bin:$PATH"
            SPYRE_INCLUDES="/opt/ibm/spyre/runtime/include:/opt/ibm/spyre/runtime/include/concurrentqueue/moodycamel:/opt/ibm/spyre/runtime/include/common/include:/opt/ibm/spyre/deeptools/include:/opt/ibm/spyre/senlib/include:/opt/ibm/spyre/senlib/flightlog/include:/opt/ibm/spyre/spyre-comms/include"
            export C_INCLUDE_PATH="${SPYRE_INCLUDES}:${C_INCLUDE_PATH:-}"
            export CPLUS_INCLUDE_PATH="${SPYRE_INCLUDES}:${CPLUS_INCLUDE_PATH:-}"
            export LIBRARY_PATH="/opt/ibm/spyre/runtime/lib:/opt/ibm/spyre/deeptools/lib:/opt/ibm/spyre/senlib/lib:${LIBRARY_PATH:-}"

            echo "=== Installing vLLM from ${SPYRE_INFERENCE_REPO} (branch: ${SPYRE_INFERENCE_BRANCH}) ==="
            git clone -b "${SPYRE_INFERENCE_BRANCH}" "${SPYRE_INFERENCE_REPO}"
            cd spyre-inference

            uv pip install cmake numpy setuptools-scm wheel ninja expecttest

            uv sync --frozen --active --inexact \
              --no-build-isolation-package vllm \
              --no-build-isolation-package torch-spyre
            cd /dev/shm

            python3 -c "import vllm; print('vLLM version:', vllm.__version__)"

            # ---- Check how many Spyre cards are visible ----
            echo "=== Spyre Device Info ==="
            python3 -c "
            import torch
            try:
                import torch_spyre
                print(f'Spyre devices available: checking...')
            except ImportError:
                print('torch_spyre not available as standalone import')
            # Check via vllm
            from vllm.platforms import current_platform
            print(f'Platform: {current_platform}')
            " || echo "Device detection failed (non-critical)"

            # ---- Install benchmark deps ----
            uv pip install pyyaml 2>/dev/null || pip install pyyaml
            which jq || (apt-get update -qq && apt-get install -y -qq jq 2>/dev/null) || true

            # ---- Clone benchmark suite ----
            echo "=== Cloning benchmark suite from ${BENCHMARK_REPO} (branch: ${BENCHMARK_BRANCH}) ==="
            git clone -b "${BENCHMARK_BRANCH}" "${BENCHMARK_REPO}" benchmark-suite
            cd benchmark-suite

            # ---- Run benchmarks ----
            echo "=== Starting benchmarks (2 Spyre PF cards) ==="
            bash scripts/run_benchmarks.sh 2>&1 | tee /dev/shm/benchmark.log

            echo "===== BENCHMARK COMPLETE ====="
      volumeMounts:
        - name: dev-shm
          mountPath: /dev/shm
      terminationMessagePath: /dev/termination-log
      terminationMessagePolicy: File
  restartPolicy: Never
  imagePullSecrets:
    - name: wxpe-cicd-vllm-iccr-internal
  serviceAccount: default
  volumes:
    - name: dev-shm
      emptyDir:
        medium: Memory
        sizeLimit: 64Gi
