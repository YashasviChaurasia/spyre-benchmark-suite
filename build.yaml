kind: Pod
apiVersion: v1
metadata:
  name: yc-vllm-spyre-benchmark
  labels:
    deployer: yc
    purpose: benchmark
spec:
  schedulerName: spyre-scheduler
  securityContext:
    seccompProfile:
      type: RuntimeDefault
  containers:
    - name: app
      image: us.icr.io/wxpe-cicd-internal/amd64/vllm-spyre-dev:dev-next
      imagePullPolicy: Always
      resources:
        limits:
          ibm.com/spyre_pf: '1'
        requests:
          ibm.com/spyre_pf: '1'
      workingDir: /dev/shm
      env:
        # ===========================================
        # USER-CONFIGURABLE: Change these to customize
        # ===========================================

        # Benchmark suite repo — fork this and point to your fork
        - name: BENCHMARK_REPO
          value: https://github.com/YashasviChaurasia/spyre-benchmark-suite.git
        - name: BENCHMARK_BRANCH
          value: main

        # vLLM + Spyre plugin repo — use a custom fork/branch for testing custom builds
        - name: SPYRE_INFERENCE_REPO
          value: https://github.com/YashasviChaurasia/spyre-inference.git
        - name: SPYRE_INFERENCE_BRANCH
          value: remove-scm-root

        # ===========================================
        # SPYRE HARDWARE CONFIG: Do not change unless
        # adjusting hardware allocation
        # ===========================================
        - name: HOME
          value: /dev/shm
        - name: HF_HOME
          value: /dev/shm
        - name: FLEX_COMPUTE
          value: SENTIENT
        - name: FLEX_DEVICE
          value: PF
        - name: TOKENIZERS_PARALLELISM
          value: 'false'
        - name: AIU_SETUP_MULTI_AIU
          value: '1'
      command:
        - bash
        - -c
        - |
            set -ex

            # ---- Cleanup from previous restarts ----
            # /dev/shm persists across container restarts within the same pod
            rm -rf /dev/shm/.venv /dev/shm/spyre-inference /dev/shm/benchmark-suite

            # ---- Phase 1: Shell environment ----
            cp /home/senuser/.bashrc ~/
            cp /home/senuser/.bash_profile ~/

            # ---- Phase 2: Install uv and create venv ----
            curl -LsSf https://astral.sh/uv/install.sh | sh
            export PATH="$HOME/.local/bin:$PATH"
            uv venv .venv --system-site-packages
            source ./.venv/bin/activate

            # ---- Phase 3: Install vLLM 0.19.0 + Spyre plugin from source ----
            # The base image /opt/vllm has vLLM 0.18.1 which crashes during
            # Spyre compile_graph warmup. spyre-inference builds vLLM 0.19.0 +
            # torch-spyre which works correctly on Spyre hardware.

            # Spyre SDK: compiler tools, headers, and libraries for torch-spyre C++ build
            export PATH="/opt/ibm/spyre/runtime/bin:$PATH"
            SPYRE_INCLUDES="/opt/ibm/spyre/runtime/include:/opt/ibm/spyre/runtime/include/concurrentqueue/moodycamel:/opt/ibm/spyre/runtime/include/common/include:/opt/ibm/spyre/deeptools/include:/opt/ibm/spyre/senlib/include:/opt/ibm/spyre/senlib/flightlog/include:/opt/ibm/spyre/spyre-comms/include"
            export C_INCLUDE_PATH="${SPYRE_INCLUDES}:${C_INCLUDE_PATH:-}"
            export CPLUS_INCLUDE_PATH="${SPYRE_INCLUDES}:${CPLUS_INCLUDE_PATH:-}"
            export LIBRARY_PATH="/opt/ibm/spyre/runtime/lib:/opt/ibm/spyre/deeptools/lib:/opt/ibm/spyre/senlib/lib:${LIBRARY_PATH:-}"

            echo "=== Installing vLLM from ${SPYRE_INFERENCE_REPO} (branch: ${SPYRE_INFERENCE_BRANCH}) ==="
            git clone -b "${SPYRE_INFERENCE_BRANCH}" "${SPYRE_INFERENCE_REPO}"
            cd spyre-inference

            # Pre-install build deps that uv sync's isolated sandbox needs
            uv pip install cmake numpy setuptools-scm wheel ninja expecttest

            # --no-build-isolation-package: let vllm and torch-spyre use
            # cmake/ninja/numpy from the venv instead of an isolated sandbox
            uv sync --frozen --active --inexact \
              --no-build-isolation-package vllm \
              --no-build-isolation-package torch-spyre
            cd /dev/shm

            # Verify vLLM 0.19.0 is installed
            python3 -c "import vllm; print('vLLM version:', vllm.__version__)"

            # ---- Phase 4: Install benchmark dependencies ----
            uv pip install pyyaml 2>/dev/null || pip install pyyaml
            which jq || (apt-get update -qq && apt-get install -y -qq jq 2>/dev/null) || true

            # ---- Phase 5: Clone benchmark suite ----
            echo "=== Cloning benchmark suite from ${BENCHMARK_REPO} (branch: ${BENCHMARK_BRANCH}) ==="
            git clone -b "${BENCHMARK_BRANCH}" "${BENCHMARK_REPO}" benchmark-suite
            cd benchmark-suite

            # ---- Phase 6: Run benchmarks ----
            echo "=== Starting benchmarks ==="
            bash scripts/run_benchmarks.sh 2>&1 | tee /dev/shm/benchmark.log

            echo "===== BENCHMARK COMPLETE ====="
      volumeMounts:
        - name: dev-shm
          mountPath: /dev/shm
      terminationMessagePath: /dev/termination-log
      terminationMessagePolicy: File
  restartPolicy: Never
  imagePullSecrets:
    - name: wxpe-cicd-vllm-iccr-internal
  serviceAccount: default
  volumes:
    - name: dev-shm
      emptyDir:
        medium: Memory
        sizeLimit: 64Gi
