kind: Pod
apiVersion: v1
metadata:
  name: yc-vllm-spyre-benchmark
  labels:
    deployer: yc
    purpose: benchmark
spec:
  schedulerName: spyre-scheduler
  securityContext:
    seccompProfile:
      type: RuntimeDefault
  containers:
    - name: app
      image: us.icr.io/wxpe-cicd-internal/amd64/vllm-spyre-dev:dev-next
      imagePullPolicy: Always
      resources:
        limits:
          ibm.com/spyre_pf: '1'
        requests:
          ibm.com/spyre_pf: '1'
      workingDir: /dev/shm
      env:
        - name: BENCHMARK_REPO
          value: https://github.com/YashasviChaurasia/spyre-benchmark-suite.git
        - name: BENCHMARK_BRANCH
          value: test/tp2-fix-v2
        - name: SPYRE_INFERENCE_REPO
          value: https://github.com/YashasviChaurasia/spyre-inference.git
        - name: SPYRE_INFERENCE_BRANCH
          value: fix/tp-worker-set-device
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: hf-token
              key: token
              optional: true
        - name: HOME
          value: /dev/shm
        - name: HF_HOME
          value: /dev/shm
        - name: FLEX_COMPUTE
          value: SENTIENT
        - name: FLEX_DEVICE
          value: PF
        - name: TOKENIZERS_PARALLELISM
          value: 'false'
        - name: AIU_SETUP_MULTI_AIU
          value: '1'
        - name: SAVE_TO_PYTORCH_BENCHMARK_FORMAT
          value: '1'
        - name: VLLM_PLUGINS
          value: spyre_inference
      command:
        - bash
        - -c
        - |
            set -ex

            # ---- Cleanup from previous restarts ----
            rm -rf /dev/shm/.venv /dev/shm/spyre-inference /dev/shm/benchmark-suite

            # ---- Phase 1: Shell environment ----
            cp /home/senuser/.bashrc ~/
            cp /home/senuser/.bash_profile ~/

            # ---- Phase 2: Install uv and create venv ----
            curl -LsSf https://astral.sh/uv/install.sh | sh
            export PATH="$HOME/.local/bin:$PATH"
            uv venv .venv --system-site-packages
            source ./.venv/bin/activate

            # ---- Phase 3: Install vLLM 0.19.0 + Spyre plugin from source ----
            export PATH="/opt/ibm/spyre/runtime/bin:$PATH"
            SPYRE_INCLUDES="/opt/ibm/spyre/runtime/include:/opt/ibm/spyre/runtime/include/concurrentqueue/moodycamel:/opt/ibm/spyre/runtime/include/common/include:/opt/ibm/spyre/deeptools/include:/opt/ibm/spyre/senlib/include:/opt/ibm/spyre/senlib/flightlog/include:/opt/ibm/spyre/spyre-comms/include"
            export C_INCLUDE_PATH="${SPYRE_INCLUDES}:${C_INCLUDE_PATH:-}"
            export CPLUS_INCLUDE_PATH="${SPYRE_INCLUDES}:${CPLUS_INCLUDE_PATH:-}"
            export LIBRARY_PATH="/opt/ibm/spyre/runtime/lib:/opt/ibm/spyre/deeptools/lib:/opt/ibm/spyre/senlib/lib:${LIBRARY_PATH:-}"

            echo "=== Installing vLLM from ${SPYRE_INFERENCE_REPO} (branch: ${SPYRE_INFERENCE_BRANCH}) ==="
            git clone -b "${SPYRE_INFERENCE_BRANCH}" "${SPYRE_INFERENCE_REPO}"
            cd spyre-inference

            uv pip install cmake numpy setuptools-scm wheel ninja expecttest

            uv sync --frozen --active --inexact \
              --no-build-isolation-package vllm \
              --no-build-isolation-package torch-spyre

            # Editable install to register spyre-inference entry points (platform plugin)
            uv pip install -e . --no-deps
            cd /dev/shm

            python3 -c "import vllm; print('vLLM version:', vllm.__version__)"
            python3 -c "from vllm.platforms import current_platform; print('Platform:', type(current_platform).__name__)"

            # ---- Phase 3b: Patch torch-spyre with TP fix (lockfile pins old version) ----
            echo "=== Patching torch-spyre with fix/tp-multiproc-device-init ==="
            git clone --depth 1 -b fix/tp-multiproc-device-init \
              https://github.com/YashasviChaurasia/torch-spyre.git /dev/shm/torch-spyre-fix
            # Find all torch_spyre locations (follow symlinks, check both lib and lib64)
            for ts_dir in $(find -L /dev/shm/.venv -path "*/torch_spyre/__init__.py" -exec dirname {} \; 2>/dev/null | sort -u); do
              echo "  Patching: $ts_dir"
              cp /dev/shm/torch-spyre-fix/torch_spyre/__init__.py "$ts_dir/__init__.py"
              cp /dev/shm/torch-spyre-fix/torch_spyre/device/interface.py "$ts_dir/device/interface.py"
            done
            # Also check lib64 explicitly in case symlink resolves differently
            if [ -d /dev/shm/.venv/lib64/python3.12/site-packages/torch_spyre ]; then
              echo "  Patching lib64 explicitly"
              cp /dev/shm/torch-spyre-fix/torch_spyre/__init__.py /dev/shm/.venv/lib64/python3.12/site-packages/torch_spyre/__init__.py
              cp /dev/shm/torch-spyre-fix/torch_spyre/device/interface.py /dev/shm/.venv/lib64/python3.12/site-packages/torch_spyre/device/interface.py
            fi
            rm -rf /dev/shm/torch-spyre-fix
            # Verify patch location
            python3 -c "import importlib.util; spec = importlib.util.find_spec('torch_spyre'); print('  torch_spyre resolved to:', spec.submodule_search_locations[0])" 2>&1 || true
            echo "  torch-spyre patch complete"

            # ---- Phase 4: Install benchmark dependencies ----
            uv pip install pyyaml 2>/dev/null || pip install pyyaml
            which jq || (apt-get update -qq && apt-get install -y -qq jq 2>/dev/null) || true

            # ---- Phase 5: Clone benchmark suite ----
            echo "=== Cloning benchmark suite from ${BENCHMARK_REPO} (branch: ${BENCHMARK_BRANCH}) ==="
            git clone -b "${BENCHMARK_BRANCH}" "${BENCHMARK_REPO}" benchmark-suite
            cd benchmark-suite

            # ---- Phase 6: Run benchmarks ----
            echo "=== Starting benchmarks ==="
            bash scripts/run_benchmarks.sh 2>&1 | tee /dev/shm/benchmark.log

            echo "===== BENCHMARK COMPLETE ====="
      volumeMounts:
        - name: dev-shm
          mountPath: /dev/shm
      terminationMessagePath: /dev/termination-log
      terminationMessagePolicy: File
  restartPolicy: Never
  imagePullSecrets:
    - name: wxpe-cicd-vllm-iccr-internal
  serviceAccount: default
  volumes:
    - name: dev-shm
      emptyDir:
        medium: Memory
        sizeLimit: 64Gi
