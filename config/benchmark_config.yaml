# Spyre vLLM Benchmark Configuration
# Minimal validation config — 1 latency + 1 throughput (~5-10 min total)

# vLLM engine settings for Spyre
engine:
  enforce_eager: true
  dtype: float16
  max_model_len: 3072
  max_num_seqs: 16
  load_format: dummy

# Models to benchmark
models:
  - name: ibm-granite/granite-3.3-8b-instruct
    tensor_parallel_size: 1

# Benchmark workloads (minimal for validation)
workloads:
  latency:
    - input_len: 128
      output_len: 128
      batch_size: 1
      num_iters_warmup: 1
      num_iters: 3

  throughput:
    - input_len: 128
      output_len: 128
      num_prompts: 10

# Metadata (attached to results)
metadata:
  device_type: IBM_Spyre_PF
  suite_version: "0.1.0"
