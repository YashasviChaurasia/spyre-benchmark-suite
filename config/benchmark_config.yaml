# Spyre vLLM Benchmark Configuration
# Edit this file in your fork to customize benchmarks.

# vLLM engine settings for Spyre
engine:
  enforce_eager: true          # avoid torch.compile overhead; set false for compiled-mode benchmarks
  dtype: float16
  max_model_len: 2048          # conservative for 1 Spyre PF card; increase with more cards
  max_num_seqs: 4              # max concurrent sequences; must match Spyre warmup batch sizes
  load_format: dummy           # "dummy" = random weights (no download); "auto" = real weights (needs HF access)

# Models to benchmark
models:
  - name: meta-llama/Meta-Llama-3-8B
    tensor_parallel_size: 1    # must match ibm.com/spyre_pf count in build.yaml

# Benchmark workloads
workloads:
  latency:
    - input_len: 128
      output_len: 128
      batch_size: 1
      num_iters_warmup: 3
      num_iters: 10
    - input_len: 256
      output_len: 256
      batch_size: 1
      num_iters_warmup: 3
      num_iters: 10
    - input_len: 512
      output_len: 128
      batch_size: 4
      num_iters_warmup: 3
      num_iters: 10

  throughput:
    - input_len: 128
      output_len: 128
      num_prompts: 50
    - input_len: 256
      output_len: 256
      num_prompts: 50
    - input_len: 512
      output_len: 128
      num_prompts: 100

# Metadata (attached to results)
metadata:
  device_type: IBM_Spyre_PF
  suite_version: "0.1.0"
