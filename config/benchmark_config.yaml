# Spyre vLLM Benchmark Configuration
# Edit this file in your fork to customize benchmarks.

# vLLM engine settings for Spyre
engine:
  dtype: float16
  max_model_len: 3072
  max_num_seqs: 16
  load_format: dummy

# Models to benchmark
models:
  - name: ibm-granite/granite-3.3-8b-instruct
    tensor_parallel_size: 1

# Benchmark workloads
workloads:
  latency:
    - input_len: 128
      output_len: 128
      batch_size: 1
      num_iters_warmup: 2
      num_iters: 5

  throughput:
    - input_len: 128
      output_len: 128
      num_prompts: 20

# Metadata (attached to results)
metadata:
  device_type: IBM_Spyre_PF
  suite_version: "0.1.0"
