# Spyre vLLM Benchmark Configuration
# This is the ONLY file you need to edit. Then run: bash run.sh

# ===================================================
# WHAT TO BENCHMARK
# ===================================================

# vLLM engine settings for Spyre
engine:
  dtype: float16
  max_model_len: 3072
  max_num_seqs: 16
  load_format: auto               # "auto" = real HF weights

# Models to benchmark
models:
  - name: ibm-granite/granite-3.3-8b-instruct
    tensor_parallel_size: 1
  - name: ibm-ai-platform/micro-g3.3-8b-instruct-1b
    tensor_parallel_size: 1

# Which benchmark types to run (comment out to disable)
benchmarks:
  - latency
  - throughput

# Workload definitions per benchmark type
workloads:
  latency:
    - input_len: 128
      output_len: 128
      batch_size: 1
      num_iters_warmup: 3
      num_iters: 10

  throughput:
    - input_len: 128
      output_len: 128
      num_prompts: 50

  serve:
    - input_len: 128
      output_len: 128
      num_prompts: 20
      request_rate: 5

# ===================================================
# DEPLOYMENT SETTINGS
# ===================================================

deployment:
  pod_name: yc-vllm-spyre-benchmark
  namespace: torch-spyre-cicd
  spyre_pf_cards: 2
  benchmark_repo: https://github.com/YashasviChaurasia/spyre-benchmark-suite.git
  benchmark_branch: feat/multi-device-parallel
  spyre_inference_repo: https://github.com/torch-spyre/spyre-inference.git
  spyre_inference_branch: main

# ===================================================
# DASHBOARD SETTINGS
# ===================================================

dashboard:
  benchmark_name: spyre_e2e_benchmark
  auto_push: true
  timeout: 7200

# ===================================================
# METADATA (attached to results)
# ===================================================

metadata:
  device_type: IBM_Spyre_PF
  suite_version: "0.1.0"
